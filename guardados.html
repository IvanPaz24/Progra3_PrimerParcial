<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Guardadas</title>
    <style>
        header{
            grid-row: 1;
            grid-column: 1 / -1;
            text-align: center;
            gap: 10px;
            padding: 5px;
        }

        body{
            background-color: bisque;
        }

        #seriesGuardadas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px; 
            padding: 16px;
      
        }
        .serie {
            background-color: #0eb4d2;
            background-color: #0eb4d2;
            /* border: 1px solid #b11d1d; */
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 8px; 
            
        } 

        button{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

         a {
            color: rgb(14, 4, 4);  
            text-decoration: none; 
            font-size: 18px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 6px;
        }
    </style>

</head>
<body>
    <main>
        <header>
            <h1>Series Guardadas</h1>
            <a href="./index.html">Volver al inicio</a>
            <button id="ordenarNombre">Ordenar por Nombre</button>
            <button id="ordenarIdioma">Ordenar por Idioma</button>
            <button id="ordenarId">Ordenar por Id</button>
        </header>
        <section>
            <div id="seriesGuardadas">
    
            </div>

        </section>


    </main>
    
    <script src="series.js"></script>
    <script src="guardados.js"></script>
</body>
</html>
